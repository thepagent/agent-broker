apiVersion: v1
kind: ConfigMap
metadata:
  name: openab-config
data:
  config.toml: |
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    allowed_channels = ["YOUR_CHANNEL_ID"]

    [agent]
    command = "kiro-cli"
    args = ["acp", "--trust-all-tools"]
    working_dir = "/home/agent"

    [pool]
    max_sessions = 10
    session_ttl_hours = 24

    [reactions]
    enabled = true
    remove_after_reply = false
