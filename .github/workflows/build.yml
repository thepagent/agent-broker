name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.7.0-beta.1 or v0.7.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build only, no push or chart bump)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    strategy:
      matrix:
        variant:
          - { suffix: "", dockerfile: "Dockerfile", artifact: "default" }
          - { suffix: "-codex", dockerfile: "Dockerfile.codex", artifact: "codex" }
          - { suffix: "-claude", dockerfile: "Dockerfile.claude", artifact: "claude" }
          - { suffix: "-gemini", dockerfile: "Dockerfile.gemini", artifact: "gemini" }
        platform:
          - { os: linux/amd64, runner: ubuntu-latest }
          - { os: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.platform.os }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }},push-by-digest=true,name-canonical=true,push=${{ inputs.dry_run != true }}
          cache-from: type=gha,scope=${{ matrix.variant.suffix }}-${{ matrix.platform.os }}
          cache-to: type=gha,scope=${{ matrix.variant.suffix }}-${{ matrix.platform.os }},mode=max

      - name: Export digest
        if: inputs.dry_run != true
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant.artifact }}-${{ matrix.platform.runner }}
          path: /tmp/digests/*
          retention-days: 1

  merge-manifests:
    needs: build-image
    if: inputs.dry_run != true
    strategy:
      matrix:
        variant:
          - { suffix: "", artifact: "default" }
          - { suffix: "-codex", artifact: "codex" }
          - { suffix: "-claude", artifact: "claude" }
          - { suffix: "-gemini", artifact: "gemini" }
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant.artifact }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.value }}
            type=raw,value=latest,enable=${{ !contains(steps.tag.outputs.value, '-') }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}@sha256:%s ' *)

  release-chart-beta:
    needs: merge-manifests
    if: ${{ inputs.dry_run != true && contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push beta chart to OCI
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          CHART_VERSION="${TAG#v}"
          IMAGE_SHA="${{ github.sha }}"
          IMAGE_SHA="${IMAGE_SHA:0:7}"

          sed -i "s/^version: .*/version: ${CHART_VERSION}/" charts/openab/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${IMAGE_SHA}\"/" charts/openab/Chart.yaml
          sed -i "s|repository: .*|repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|" charts/openab/values.yaml
          sed -i "s/tag: .*/tag: \"${IMAGE_SHA}\"/" charts/openab/values.yaml

          helm package charts/openab
          helm push openab-${CHART_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  bump-chart-stable:
    needs: merge-manifests
    if: ${{ inputs.dry_run != true && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Chart.yaml and values.yaml
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          CHART_VERSION="${TAG#v}"
          IMAGE_SHA="${{ github.sha }}"
          IMAGE_SHA="${IMAGE_SHA:0:7}"
          sed -i "s/^version: .*/version: ${CHART_VERSION}/" charts/openab/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${IMAGE_SHA}\"/" charts/openab/Chart.yaml
          sed -i "s|repository: .*|repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|" charts/openab/values.yaml
          sed -i "s/tag: .*/tag: \"${IMAGE_SHA}\"/" charts/openab/values.yaml

      - name: Create and auto-merge bump PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          CHART_VERSION="${TAG#v}"
          IMAGE_SHA="${{ github.sha }}"
          IMAGE_SHA="${IMAGE_SHA:0:7}"
          BRANCH="chore/chart-${CHART_VERSION}"
          git config user.name "openab-app[bot]"
          git config user.email "274185012+openab-app[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add charts/openab/Chart.yaml charts/openab/values.yaml
          git commit -m "chore: bump chart to ${CHART_VERSION}

          image: ${IMAGE_SHA}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: bump chart to ${CHART_VERSION}" \
            --body "Auto-generated chart version bump for image \`${IMAGE_SHA}\`." \
            --base main --head "$BRANCH")
          gh pr merge "$PR_URL" --squash --delete-branch
