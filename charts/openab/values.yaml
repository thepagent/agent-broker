image:
  repository: ghcr.io/openabdev/openab
  tag: "78f8d2c"
  pullPolicy: IfNotPresent

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

agents:
  kiro:
    # To add a second agent, uncomment and fill in the block below:
    # qwen:
    #   image:
    #     repository: ghcr.io/openabdev/openab-qwen
    #     tag: "latest"
    #   command: qwen
    #   args:
    #     - --acp
    #   discord:
    #     botToken: ""
    #     # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss
    #     allowedChannels:
    #       - "YOUR_CHANNEL_ID"
    #   workingDir: /home/node
    #   env:
    #     OPENAI_API_KEY: "${OPENAI_API_KEY}"
    #   envFrom: []
    #   pool:
    #     maxSessions: 10
    #     sessionTtlHours: 24
    #   reactions:
    #     enabled: true
    #     removeAfterReply: false
    #   persistence:
    #     enabled: true
    #     storageClass: ""
    #     size: 1Gi
    #   agentsMd: ""
    #   resources: {}
    #   nodeSelector: {}
    #   tolerations: []
    #   affinity: {}
    image:
      repository: ""
      tag: ""
    command: kiro-cli
    args:
      - acp
      - --trust-all-tools
    discord:
      botToken: ""
      # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss
      allowedChannels:
        - "YOUR_CHANNEL_ID"
    workingDir: /home/agent
    env: {}
    envFrom: []
    pool:
      maxSessions: 10
      sessionTtlHours: 24
    reactions:
      enabled: true
      removeAfterReply: false
    persistence:
      enabled: true
      storageClass: ""
      size: 1Gi
    agentsMd: ""
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
