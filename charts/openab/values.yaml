image:
  repository: ghcr.io/openabdev/openab
  # tag defaults to .Chart.AppVersion
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

agents:
  kiro:
    enabled: true    # set to false to skip creating resources for this agent
    # To add a second agent, uncomment and fill in the block below:
    # claude:
    #   command: claude-agent-acp
    #   args: []
    #   discord:
    #     enabled: true
    #     # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss
    #     allowedChannels:
    #       - "YOUR_CHANNEL_ID"
    #     allowedUsers: []
    #     # allowBotMessages: "off" (default) | "mentions" | "all"
    #     # recommended for multi-agent collaboration
    #     allowBotMessages: "off"
    #     # trustedBotIds: []  # empty = any bot (mode permitting)
    #     trustedBotIds: []
    #   workingDir: /home/agent
    #   env:
    #     # simple key-value
    #     MY_VAR: "hello"
    #     # valueFrom (fieldRef, secretKeyRef, configMapKeyRef, etc.)
    #     MY_POD_NAME:
    #       valueFrom:
    #         fieldRef:
    #           fieldPath: metadata.name
    #   envFrom: []
    #   pool:
    #     maxSessions: 10
    #     sessionTtlHours: 24
    #   reactions:
    #     enabled: true
    #     removeAfterReply: false
    #   persistence:
    #     enabled: true
    #     storageClass: ""
    #     size: 1Gi
    #   # ⚠️ When set, this ConfigMap mount shadows any file at the same path on the PVC.
    #   # The PVC file is NOT deleted but becomes invisible to the agent. Remove agentsMd to restore.
    #   agentsMd: ""
    #   resources: {}
    #   nodeSelector: {}
    #   tolerations: []
    #   affinity: {}
    #   image: "ghcr.io/openabdev/openab-claude:latest"
    # opencode:
    #   command: opencode
    #   args:
    #     - acp
    #   discord:
    #     enabled: true
    #     allowedChannels:
    #       - "YOUR_CHANNEL_ID"
    #     allowedUsers: []
    #     allowBotMessages: "off"
    #     trustedBotIds: []
    #   workingDir: /home/node
    #   env: {}
    #   envFrom: []
    #   pool:
    #     maxSessions: 10
    #     sessionTtlHours: 24
    #   reactions:
    #     enabled: true
    #     removeAfterReply: false
    #   persistence:
    #     enabled: true
    #     storageClass: ""
    #     size: 1Gi
    #   agentsMd: ""
    #   resources: {}
    #   image: "ghcr.io/openabdev/openab-opencode:latest"
    # cursor:
    #   command: cursor-agent
    #   args:
    #     - acp
    #     - --model
    #     - auto
    #     - --workspace
    #     - /home/agent
    #   discord:
    #     enabled: true
    #     allowedChannels:
    #       - "YOUR_CHANNEL_ID"
    #     allowedUsers: []
    #   workingDir: /home/agent
    #   env: {}
    #   envFrom: []
    #   pool:
    #     maxSessions: 10
    #     sessionTtlHours: 24
    #   reactions:
    #     enabled: true
    #     removeAfterReply: false
    #   persistence:
    #     enabled: true
    #     storageClass: ""
    #     size: 1Gi
    #   image: "ghcr.io/openabdev/openab-cursor:latest"
    image: ""
    imagePullPolicy: ""
    # imagePullSecrets: unset inherits global; set to [] to opt out.
    # imagePullSecrets: []
    command: kiro-cli
    args:
      - acp
      - --trust-all-tools
    discord:
      enabled: true      # set to false to disable the discord adapter
      # botToken is no longer required at render time; the actual token
      # is injected at runtime via the DISCORD_BOT_TOKEN env var.
      # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss
      allowedChannels:
        - "YOUR_CHANNEL_ID"
      # ⚠️ Use --set-string for user IDs to avoid float64 precision loss
      allowedUsers: []  # empty = allow all users (default)
      # allowBotMessages: "off" (default) | "mentions" | "all"
      # recommended for multi-agent collaboration
      allowBotMessages: "off"
      # trustedBotIds: []  # empty = any bot (mode permitting); set to restrict
      trustedBotIds: []
    slack:
      enabled: false
      botToken: ""       # Bot User OAuth Token (xoxb-...)
      appToken: ""       # App-Level Token (xapp-...) for Socket Mode
      allowedChannels: []  # empty = allow all channels
      allowedUsers: []     # empty = allow all users
      # allowBotMessages: "off" (default) | "mentions" | "all"
      allowBotMessages: "off"
      # trustedBotIds: Bot User IDs (U...) — find via Slack UI: click bot profile → Copy member ID
      trustedBotIds: []
      # allowUserMessages: "involved" (default) | "mentions"
      # "involved" = respond to thread follow-ups without @mention if bot has participated
      # "mentions" = always require @mention
      allowUserMessages: "involved"
    workingDir: /home/agent
    env: {}
    envFrom: []
    pool:
      maxSessions: 10
      sessionTtlHours: 24
    reactions:
      enabled: true
      removeAfterReply: false
    stt:
      enabled: false
      apiKey: ""
      model: "whisper-large-v3-turbo"
      baseUrl: "https://api.groq.com/openai/v1"
    persistence:
      enabled: true
      storageClass: ""
      size: 1Gi  # defaults to 1Gi if not set
    # ⚠️ When set, this ConfigMap mount shadows any file at the same path on the PVC.
    # The PVC file is NOT deleted but becomes invisible to the agent. Remove agentsMd to restore.
    agentsMd: ""
    resources: {}
    # -- Pod extensibility
    serviceAccountName: ""
    podAnnotations: {}
    podLabels: {}
    livenessProbe: {}   # {} = disabled
    readinessProbe: {}  # {} = disabled
    startupProbe: {}    # {} = disabled
    lifecycle: {}       # {} = disabled
    initContainers: []
    extraContainers: []
    extraVolumes: []
    extraVolumeMounts: []
    nodeSelector: {}
    tolerations: []
    affinity: {}
