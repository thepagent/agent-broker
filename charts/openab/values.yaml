image:
  repository: ghcr.io/openabdev/openab
  # tag defaults to .Chart.AppVersion
  tag: ""
  pullPolicy: IfNotPresent

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

agents:
  kiro:
    enabled: true    # set to false to skip creating resources for this agent
    # To add a second agent, uncomment and fill in the block below:
    # claude:
    #   command: claude-agent-acp
    #   args: []
    #   discord:
    #     botToken: ""
    #     # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss
    #     allowedChannels:
    #       - "YOUR_CHANNEL_ID"
    #     allowedUsers: []
    #   workingDir: /home/agent
    #   env: {}
    #   envFrom: []
    #   pool:
    #     maxSessions: 10
    #     sessionTtlHours: 24
    #   reactions:
    #     enabled: true
    #     removeAfterReply: false
    #   persistence:
    #     enabled: true
    #     storageClass: ""
    #     size: 1Gi
    #   agentsMd: ""
    #   resources: {}
    #   nodeSelector: {}
    #   tolerations: []
    #   affinity: {}
    #   image: "ghcr.io/openabdev/openab-claude:latest"
    image: ""
    command: kiro-cli
    args:
      - acp
      - --trust-all-tools
    discord:
      botToken: ""
      # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss
      allowedChannels:
        - "YOUR_CHANNEL_ID"
      # ⚠️ Use --set-string for user IDs to avoid float64 precision loss
      allowedUsers: []  # empty = allow all users (default)
    workingDir: /home/agent
    env: {}
    envFrom: []
    pool:
      maxSessions: 10
      sessionTtlHours: 24
    reactions:
      enabled: true
      removeAfterReply: false
    persistence:
      enabled: true
      storageClass: ""
      size: 1Gi  # defaults to 1Gi if not set
    agentsMd: ""
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
