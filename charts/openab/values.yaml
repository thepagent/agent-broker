image:
  repository: ghcr.io/openabdev/openab
  tag: "dd7e1ca"
  pullPolicy: IfNotPresent

replicas: 1

strategy:
  type: Recreate

resources: {}

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi

discord:
  botToken: ""            # set via --set or external secret
  # ⚠️ Use --set-string for channel IDs to avoid float64 precision loss:
  #   helm install ... --set-string discord.allowedChannels[0]="<CHANNEL_ID>"
  allowedChannels:
    - "YOUR_CHANNEL_ID"
  autoArchiveDuration: 1440    # 60 (1h), 1440 (1d), 4320 (3d), 10080 (1w)
  requireMention: true         # false = "direct mode" (any message triggers a thread)
  ignoreOtherMentions: false   # true = skip messages mentioning other bots/users
  threadNameMode: "truncate"   # "truncate" or "generated" (LLM generates short title)
  # Per-channel overrides (optional):
  # channels:
  #   "CHANNEL_ID":
  #     autoArchiveDuration: 60
  #     requireMention: false
  #     threadNameMode: "generated"
  channels: {}

agent:
  preset: ""              # kiro (default), codex, or claude — auto-configures image + command
  command: kiro-cli
  args:
    - acp
    - --trust-all-tools
  workingDir: /home/agent
  env: {}
    # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

pool:
  maxSessions: 10
  sessionTtlHours: 24

reactions:
  enabled: true
  removeAfterReply: false

agentsMd: ""
  # agentsMd: |
  #   IDENTITY - your agent identity
  #   SOUL - your agent personality
  #   USER - how agent should address the user

env: {}
envFrom: []

nodeSelector: {}
tolerations: []
affinity: {}
