{{- range $name, $cfg := .Values.agents }}
{{- if and (ne (include "openab.agentEnabled" $cfg) "false") (($cfg.gateway).enabled) }}
{{- if ne (($cfg.gateway).deploy | toString) "false" }}
{{- $gwCfg := omit $cfg "nameOverride" }}
{{- $d := dict "ctx" $ "agent" (printf "%s-gateway" $name) "cfg" $gwCfg }}
{{- $hasTeams := and (($cfg.gateway).teams).appId (($cfg.gateway).teams).appSecret }}
{{- $hasFeishu := and (($cfg.gateway).feishu).appId (($cfg.gateway).feishu).appSecret }}
{{- $hasTelegram := (($cfg.gateway).telegram).botToken }}
{{- $hasLine := (($cfg.gateway).line).channelSecret }}
{{- if or $hasTeams $hasFeishu $hasTelegram $hasLine }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openab.agentFullname" $d }}
  labels:
    {{- include "openab.labels" $d | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if $hasTeams }}
  teams-app-secret: {{ ($cfg.gateway).teams.appSecret | b64enc | quote }}
  {{- end }}
  {{- if $hasFeishu }}
  feishu-app-secret: {{ ($cfg.gateway).feishu.appSecret | b64enc | quote }}
  {{- if ($cfg.gateway).feishu.verificationToken }}
  feishu-verification-token: {{ ($cfg.gateway).feishu.verificationToken | b64enc | quote }}
  {{- end }}
  {{- if ($cfg.gateway).feishu.encryptKey }}
  feishu-encrypt-key: {{ ($cfg.gateway).feishu.encryptKey | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if $hasTelegram }}
  telegram-bot-token: {{ (($cfg.gateway).telegram).botToken | b64enc | quote }}
  {{- if (($cfg.gateway).telegram).secretToken }}
  telegram-secret-token: {{ (($cfg.gateway).telegram).secretToken | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if $hasLine }}
  line-channel-secret: {{ (($cfg.gateway).line).channelSecret | b64enc | quote }}
  {{- if (($cfg.gateway).line).channelAccessToken }}
  line-channel-access-token: {{ (($cfg.gateway).line).channelAccessToken | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
