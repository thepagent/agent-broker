apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openab.fullname" . }}
  labels:
    {{- include "openab.labels" . | nindent 4 }}
data:
  config.toml: |
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    {{- range .Values.discord.allowedChannels }}
    {{- if regexMatch "e\\+|E\\+" (toString .) }}
    {{- fail (printf "discord.allowedChannels contains a mangled ID: %s — use --set-string instead of --set for channel IDs" (toString .)) }}
    {{- end }}
    {{- end }}
    allowed_channels = [{{ range $i, $ch := .Values.discord.allowedChannels }}{{ if $i }}, {{ end }}"{{ $ch }}"{{ end }}]
    auto_archive_duration = {{ .Values.discord.autoArchiveDuration }}
    require_mention = {{ .Values.discord.requireMention }}
    ignore_other_mentions = {{ .Values.discord.ignoreOtherMentions }}
    thread_name_mode = "{{ .Values.discord.threadNameMode }}"
    {{- range $id, $cfg := .Values.discord.channels }}

    [discord.channels."{{ $id }}"]
    {{- if $cfg.autoArchiveDuration }}
    auto_archive_duration = {{ $cfg.autoArchiveDuration }}
    {{- end }}
    {{- if ne (toString (default "" $cfg.requireMention)) "" }}
    require_mention = {{ $cfg.requireMention }}
    {{- end }}
    {{- if ne (toString (default "" $cfg.ignoreOtherMentions)) "" }}
    ignore_other_mentions = {{ $cfg.ignoreOtherMentions }}
    {{- end }}
    {{- if $cfg.threadNameMode }}
    thread_name_mode = "{{ $cfg.threadNameMode }}"
    {{- end }}
    {{- end }}

    [agent]
    command = "{{ include "openab.agent.command" . | trim }}"
    args = {{ include "openab.agent.args" . | trim }}
    working_dir = "{{ .Values.agent.workingDir }}"
    {{- if .Values.agent.env }}
    env = { {{ range $k, $v := .Values.agent.env }}{{ $k }} = "{{ $v }}", {{ end }} }
    {{- end }}

    [pool]
    max_sessions = {{ .Values.pool.maxSessions }}
    session_ttl_hours = {{ .Values.pool.sessionTtlHours }}

    [reactions]
    enabled = {{ .Values.reactions.enabled }}
    remove_after_reply = {{ .Values.reactions.removeAfterReply }}
  {{- if .Values.agentsMd }}
  AGENTS.md: |
    {{- .Values.agentsMd | nindent 4 }}
  {{- end }}
