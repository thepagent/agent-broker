{{- range $name, $cfg := .Values.agents }}
{{- $d := dict "ctx" $ "agent" $name "cfg" $cfg }}
{{- $pvcEnabled := and $cfg.persistence $cfg.persistence.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openab.agentFullname" $d }}
  labels:
    {{- include "openab.labels" $d | nindent 4 }}
spec:
  # Hardcoded for PVC-backed agents: RWO volumes can't be shared across pods,
  # so rolling updates and multiple replicas are not supported.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openab.selectorLabels" $d | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ $cfg | toJson | sha256sum }}
      labels:
        {{- include "openab.selectorLabels" $d | nindent 8 }}
    spec:
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: openab
          image: {{ include "openab.agentImage" $d | quote }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if $cfg.discord.botToken }}
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $d }}
                  key: discord-bot-token
            {{- end }}
            - name: HOME
              value: {{ $cfg.workingDir }}
            {{- range $k, $v := $cfg.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- with $cfg.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/openab
              readOnly: true
            {{- if $pvcEnabled }}
            - name: data
              mountPath: {{ $cfg.workingDir }}
            {{- end }}
            {{- if $cfg.agentsMd }}
            - name: config
              mountPath: {{ $cfg.workingDir }}/AGENTS.md
              subPath: AGENTS.md
            {{- end }}
      {{- with $cfg.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "openab.agentFullname" $d }}
        {{- if $pvcEnabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openab.agentFullname" $d }}
        {{- end }}
{{- end }}
