image:
  pullPolicy: IfNotPresent

# Each entry in `agents` creates an independent StatefulSet, ConfigMap, and Secret.
# Add as many agents as you need — each can serve different Discord channels.
agents:
  kiro:
    image:
      repository: ghcr.io/thepagent/agent-broker
      tag: ""             # defaults to .Chart.AppVersion
    command: kiro-cli
    args:
      - acp
      - --trust-all-tools
    discord:
      botToken: ""        # set via --set or external secret
      allowedChannels:
        - "YOUR_CHANNEL_ID"
    workingDir: /home/agent
    agentsMd: ""
    # agentsMd: |
    #   IDENTITY - your agent identity
    #   SOUL - your agent personality
    #   USER - how agent should address the user
    env: {}
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    envFrom: []
    pool:
      maxSessions: 10
      sessionTtlHours: 24
    reactions:
      enabled: true
      removeAfterReply: false
    persistence:
      storageClass: ""
      size: 1Gi
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

