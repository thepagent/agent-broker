image:
  pullPolicy: IfNotPresent

# Each entry in `agents` creates an independent Deployment and ConfigMap/Secret.
# Add as many agents as you need — each can serve different Discord channels.
agents:
  kiro:
    image:
      repository: ghcr.io/thepagent/agent-broker
      tag: ""             # defaults to .Chart.AppVersion
    command: kiro-cli
    args:
      - acp
      - --trust-all-tools
    discord:
      botToken: ""        # set via --set or external secret
      allowedChannels:
        - "YOUR_CHANNEL_ID"
    workingDir: /home/agent
    agentsMd: ""
    # agentsMd: |
    #   IDENTITY - your agent identity
    #   SOUL - your agent personality
    #   USER - how agent should address the user
    env: {}
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    envFrom: []
    pool:
      maxSessions: 10
      sessionTtlHours: 24
    reactions:
      enabled: true
      removeAfterReply: false
    persistence:
      s3:
        enabled: false
        bucket: ""
        prefix: ""                # e.g. "agents/kiro" — unique per agent
        credentialsSecret: ""     # Secret with AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
        endpoint: ""              # leave empty for AWS S3; set for MinIO e.g. http://minio:9000
        region: "us-east-1"
      # Paths relative to $HOME to backup/restore.
      # Adjust per CLI type:
      #   kiro-cli:        [.kiro/settings, .kiro/steering]
      #   claude-agent-acp:[.claude]
      #   codex:           [.codex]
      #   gemini:          [.config/gemini]
      paths:
        - .kiro/settings
        - .kiro/steering
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

# Example: add a second agent for Claude Code on different channels
