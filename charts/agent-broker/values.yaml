# ── Built-in MinIO (optional) ──────────────────────────────────────────────
# Enable this if you don't have an existing S3 or MinIO instance.
# When enabled, all agents with persistence.s3.enabled=true and an empty
# persistence.s3.endpoint will automatically point to this internal MinIO.
minio:
  enabled: false
  auth:
    rootUser: admin
    rootPassword: ""     # set via --set minio.auth.rootPassword=...
  defaultBuckets: "agent-broker"
  persistence:
    size: 5Gi
