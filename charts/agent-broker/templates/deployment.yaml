apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-broker.fullname" . }}
  labels:
    {{- include "agent-broker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agent-broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "agent-broker.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: agent-broker
          image: "{{ include "agent-broker.image.repository" . | trim }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent-broker.fullname" . }}
                  key: discord-bot-token
            - name: HOME
              value: /home/agent
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/agent-broker
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /home/agent
            {{- end }}
            {{- if .Values.agentsMd }}
            - name: config
              mountPath: /home/agent/AGENTS.md
              subPath: AGENTS.md
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "agent-broker.fullname" . }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agent-broker.fullname" . }}
        {{- end }}
