{{- range $name, $agent := .Values.agents }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" (include "agent-broker.fullname" $) $name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "agent-broker.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
data:
  config.toml: |
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    allowed_channels = [{{ range $i, $ch := $agent.discord.allowedChannels }}{{ if $i }}, {{ end }}"{{ $ch }}"{{ end }}]

    [agent]
    command = "{{ $agent.command }}"
    args = {{ $agent.args | toJson }}
    working_dir = "{{ $agent.workingDir | default "/home/agent" }}"
    {{- if $agent.env }}
    env = { {{ range $k, $v := $agent.env }}{{ $k }} = "{{ $v }}", {{ end }} }
    {{- end }}

    [pool]
    max_sessions = {{ $agent.pool.maxSessions }}
    session_ttl_hours = {{ $agent.pool.sessionTtlHours }}

    [reactions]
    enabled = {{ $agent.reactions.enabled }}
    remove_after_reply = {{ $agent.reactions.removeAfterReply }}
  {{- if $agent.agentsMd }}
  AGENTS.md: |
    {{- $agent.agentsMd | nindent 4 }}
  {{- end }}
{{- end }}
