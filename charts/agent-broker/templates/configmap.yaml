apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-broker.fullname" . }}
  labels:
    {{- include "agent-broker.labels" . | nindent 4 }}
data:
  config.toml: |
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    allowed_channels = [{{ range $i, $ch := .Values.discord.allowedChannels }}{{ if $i }}, {{ end }}"{{ $ch }}"{{ end }}]

    [agent]
    command = "{{ .Values.agent.command }}"
    args = [{{ range $i, $a := .Values.agent.args }}{{ if $i }}, {{ end }}"{{ $a }}"{{ end }}]
    working_dir = "{{ .Values.agent.workingDir }}"
    {{- if .Values.agent.env }}
    env = { {{ range $k, $v := .Values.agent.env }}{{ $k }} = "{{ $v }}", {{ end }} }
    {{- end }}

    [pool]
    max_sessions = {{ .Values.pool.maxSessions }}
    session_ttl_hours = {{ .Values.pool.sessionTtlHours }}

    [reactions]
    enabled = {{ .Values.reactions.enabled }}
    remove_after_reply = {{ .Values.reactions.removeAfterReply }}
  {{- if .Values.agentsMd }}
  AGENTS.md: |
    {{- .Values.agentsMd | nindent 4 }}
  {{- end }}
